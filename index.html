<title>CENTRAL — El panel de control para negocios que venden por WhatsApp e Instagram</title>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black:   #08080f;
    --surface: #0f0f1a;
    --card:    #141421;
    --border:  rgba(255,255,255,0.07);
    --text:    #e8e8f0;
    --muted:   #7070a0;
    --accent:  #7c5cfc;
    --glow:    rgba(124,92,252,0.25);
    --cyan:    #00d4ff;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    line-height: 1.6;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,0.012) 40px, rgba(255,255,255,0.012) 41px),
      repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,0.012) 40px, rgba(255,255,255,0.012) 41px);
    pointer-events: none;
    z-index: 0;
  }

  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 48px;
    background: rgba(8,8,15,0.8);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
  }
  .nav-logo {
    font-family: 'Syne', sans-serif;
    font-size: 17px; font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
    display: flex; align-items: baseline; gap: 6px;
  }
  .nav-logo span { color: var(--accent); }
  .nav-logo-sub {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 500;
    letter-spacing: 0;
    color: var(--muted);
  }
  .nav-contact {
    font-size: 13px; font-weight: 500;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }
  .nav-contact:hover { color: var(--text); }

  .hero {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    padding: 120px 24px 80px;
    overflow: hidden;
  }

  .orb {
    position: absolute;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle at center, rgba(124,92,252,0.18) 0%, rgba(0,212,255,0.06) 40%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -52%);
    animation: pulse 6s ease-in-out infinite;
    pointer-events: none;
  }
  .orb::after {
    content: '';
    position: absolute;
    inset: 80px;
    border-radius: 50%;
    border: 1px solid rgba(124,92,252,0.2);
    animation: pulse 6s ease-in-out infinite reverse;
  }
  @keyframes pulse {
    0%, 100% { transform: translate(-50%, -52%) scale(1); opacity: 0.8; }
    50%       { transform: translate(-50%, -52%) scale(1.06); opacity: 1; }
  }

  .hero-eyebrow {
    font-size: 11px; font-weight: 500; letter-spacing: 2.5px;
    text-transform: uppercase; color: var(--accent);
    margin-bottom: 20px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(36px, 6vw, 72px);
    font-weight: 900;
    line-height: 1.05;
    letter-spacing: -2px;
    color: var(--text);
    max-width: 820px;
    margin-bottom: 24px;
  }
  h1 em {
    font-style: normal;
    background: linear-gradient(135deg, var(--accent), var(--cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .hero-sub {
    font-size: 18px; font-weight: 300;
    color: var(--muted); max-width: 520px;
    margin: 0 auto 48px;
    line-height: 1.7;
  }

    display: inline-flex; align-items: center; gap: 8px;
    padding: 14px 32px;
    background: var(--accent);
    color: #fff; font-size: 14px; font-weight: 600;
